<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Excel Generator</title>
<script src="./xlsx.bundle.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#f8f9fa;display:flex;justify-content:center;padding:2rem}
.wrap{max-width:800px;width:100%}
h1{text-align:center;margin-bottom:.5rem;font-size:1.5rem}
.subtitle{text-align:center;color:#666;margin-bottom:1rem;font-size:.85rem}
.card{background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:1.2rem;margin-bottom:1rem}
.card h2{font-size:.9rem;margin-bottom:.8rem;color:#333}
label{display:block;font-size:.75rem;font-weight:700;color:#666;text-transform:uppercase;margin-bottom:.3rem;margin-top:.6rem}
textarea{width:100%;border:1px solid #ccc;border-radius:6px;padding:.5rem;font-size:.7rem;font-family:monospace;resize:vertical}
.actions{display:flex;gap:.5rem}
button{padding:.7rem;border:none;border-radius:6px;font-size:.9rem;font-weight:700;cursor:pointer}
.primary{background:#2563eb;color:#fff;flex:1}
.success{background:#16a34a;color:#fff;flex:1}
.outline{background:#fff;border:1px solid #ccc}
.msg{text-align:center;padding:2rem;font-size:1.1rem;color:#333}
.collapsible-btn{width:100%;text-align:left;background:none;border:1px solid #ccc;border-radius:6px;padding:.5rem;font-size:.75rem;font-weight:700;color:#666;cursor:pointer}
.collapsible-content{display:none;margin-top:.5rem}
.collapsible-content.open{display:block}
.section-group{margin-bottom:.5rem}
.kv-row{display:flex;gap:.5rem;margin-bottom:.4rem;align-items:center}
.kv-row input{border:1px solid #ccc;border-radius:4px;padding:.4rem;font-size:.8rem}
.kv-key{width:30%;font-weight:700}
.kv-val{flex:1}
.kv-del{background:#ef4444;color:#fff;border:none;border-radius:4px;padding:.3rem .6rem;font-size:.75rem;cursor:pointer}
.add-btn{background:#f1f3f5;border:1px dashed #adb5bd;border-radius:6px;padding:.4rem;font-size:.75rem;color:#495057;cursor:pointer;width:100%;margin-top:.3rem}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ─── Default XML templates (fallback if template.json not found) ────
var DEFAULT_STYLES_XML = '';
var DEFAULT_HEADER_XML = '';
var DEFAULT_ROW_XML = '';
var DEFAULT_SUMMARY_XML = '';
var DEFAULT_FOOTER_XML = '';
var DEFAULT_JSON = '{\n  "vars": {},\n  "data": []\n}';
var templateLoaded = false;

// Load template from external JSON file
function loadTemplate(url) {
  return fetch(url).then(function(res) {
    if (!res.ok) throw new Error('Template not found: ' + res.status);
    return res.json();
  }).then(function(tpl) {
    if (tpl.styles) DEFAULT_STYLES_XML = tpl.styles;
    if (tpl.header) DEFAULT_HEADER_XML = tpl.header;
    if (tpl.row) DEFAULT_ROW_XML = tpl.row;
    if (tpl.summary) DEFAULT_SUMMARY_XML = tpl.summary;
    if (tpl.footer) DEFAULT_FOOTER_XML = tpl.footer;
    templateLoaded = true;
    return tpl;
  });
}

// Determine template URL: ?template=xxx.json or default ./template.json
var urlParams = new URLSearchParams(window.location.search);
var templateUrl = urlParams.get('template') || './template.json';
var templateFileName = templateUrl.split('/').pop() || 'template.json';

// ─── XML Parsing Engine ─────────────────────────────────────
const SS = "urn:schemas-microsoft-com:office:spreadsheet";

function getAttr(el, ns, name) {
  return el.getAttributeNS(ns, name) || el.getAttribute("ss:" + name) || null;
}

function parseStyles(doc) {
  var map = new Map();
  var els = doc.getElementsByTagName("Style");
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var id = getAttr(el, SS, "ID") || "";
    var style = {};
    var fontEl = el.getElementsByTagName("Font")[0];
    if (fontEl) {
      style.font = {
        name: getAttr(fontEl, SS, "FontName") || undefined,
        size: getAttr(fontEl, SS, "Size") ? parseFloat(getAttr(fontEl, SS, "Size")) : undefined,
        bold: getAttr(fontEl, SS, "Bold") === "1",
        color: getAttr(fontEl, SS, "Color") || undefined
      };
    }
    var alignEl = el.getElementsByTagName("Alignment")[0];
    if (alignEl) {
      style.alignment = {
        horizontal: getAttr(alignEl, SS, "Horizontal") || undefined,
        vertical: getAttr(alignEl, SS, "Vertical") || undefined
      };
    }
    var bordersEl = el.getElementsByTagName("Borders")[0];
    if (bordersEl) {
      var borderEls = bordersEl.getElementsByTagName("Border");
      var borders = {};
      for (var b = 0; b < borderEls.length; b++) {
        var pos = getAttr(borderEls[b], SS, "Position");
        if (pos === "Top") borders.top = true;
        if (pos === "Bottom") borders.bottom = true;
        if (pos === "Left") borders.left = true;
        if (pos === "Right") borders.right = true;
      }
      style.borders = borders;
    }
    var nfEl = el.getElementsByTagName("NumberFormat")[0];
    if (nfEl) style.numberFormat = getAttr(nfEl, SS, "Format") || undefined;
    map.set(id, style);
  }
  return map;
}

function toXlsxStyle(style) {
  if (!style) return {};
  var s = {};
  if (style.font) {
    s.font = { name: style.font.name || "맑은 고딕", sz: style.font.size || 12, bold: style.font.bold || false };
    if (style.font.color) s.font.color = { rgb: style.font.color.replace("#", "") };
  }
  if (style.alignment) {
    s.alignment = {
      horizontal: (style.alignment.horizontal || "left").toLowerCase(),
      vertical: (style.alignment.vertical || "center").toLowerCase(),
      wrapText: true
    };
  }
  if (style.borders) {
    var thin = { style: "thin", color: { rgb: "000000" } };
    s.border = {};
    if (style.borders.top) s.border.top = thin;
    if (style.borders.bottom) s.border.bottom = thin;
    if (style.borders.left) s.border.left = thin;
    if (style.borders.right) s.border.right = thin;
  }
  if (style.numberFormat) s.numFmt = style.numberFormat;
  return s;
}

function resolveCellPositions(cells) {
  var result = [];
  var currentCol = 0;
  for (var i = 0; i < cells.length; i++) {
    var cell = cells[i];
    if (cell.colIndex !== undefined) currentCol = cell.colIndex - 1;
    result.push({ cell: cell, col: currentCol });
    currentCol += 1 + cell.mergeAcross;
  }
  return result;
}

function wrapInWorkbook(stylesXml, tableContent) {
  return '<?xml version="1.0"?>' +
    '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"' +
    ' xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"' +
    ' xmlns:x="urn:schemas-microsoft-com:office:excel">' +
    '<Styles>' + stylesXml + '</Styles>' +
    '<Worksheet ss:Name="Sheet1"><Table>' + tableContent + '</Table></Worksheet>' +
    '</Workbook>';
}

function parseRowElements(tableEl) {
  var rows = [];
  for (var i = 0; i < tableEl.children.length; i++) {
    var rowEl = tableEl.children[i];
    if (rowEl.tagName !== "Row") continue;
    var rowIdx = getAttr(rowEl, SS, "Index");
    var height = getAttr(rowEl, SS, "Height");
    var cells = [];
    var cellEls = rowEl.getElementsByTagName("Cell");
    for (var c = 0; c < cellEls.length; c++) {
      var cellEl = cellEls[c];
      var dataEl = cellEl.getElementsByTagName("Data")[0];
      var value = dataEl ? (dataEl.textContent || "") : "";
      var type = dataEl ? (getAttr(dataEl, SS, "Type") || "String") : "String";
      var styleId = getAttr(cellEl, SS, "StyleID") || "Default";
      var mergeAcross = parseInt(getAttr(cellEl, SS, "MergeAcross") || "0");
      var mergeDown = parseInt(getAttr(cellEl, SS, "MergeDown") || "0");
      var colIdx = getAttr(cellEl, SS, "Index");
      cells.push({ value: value, type: type, styleId: styleId, mergeAcross: mergeAcross, mergeDown: mergeDown, colIndex: colIdx ? parseInt(colIdx) : undefined });
    }
    rows.push({ cells: cells, height: height ? parseFloat(height) : undefined, index: rowIdx ? parseInt(rowIdx) : undefined });
  }
  return rows;
}

function parseColumnElements(tableEl) {
  var columns = [];
  var colEls = tableEl.getElementsByTagName("Column");
  for (var i = 0; i < colEls.length; i++) {
    var el = colEls[i];
    var idx = getAttr(el, SS, "Index");
    var w = parseFloat(getAttr(el, SS, "Width") || "75");
    columns.push({ width: w, index: idx ? parseInt(idx) : undefined });
  }
  return columns;
}

function parseSectionXml(sectionXml, stylesXml) {
  var xml = wrapInWorkbook(stylesXml, sectionXml);
  var parser = new DOMParser();
  var doc = parser.parseFromString(xml, "text/xml");
  var err = doc.querySelector("parsererror");
  if (err) throw new Error("XML 파싱 오류: " + (err.textContent || "").slice(0, 100));
  var styles = parseStyles(doc);
  var tableEl = doc.getElementsByTagName("Table")[0];
  var rows = parseRowElements(tableEl);
  var columns = parseColumnElements(tableEl);
  return { rows: rows, columns: columns, styles: styles };
}

function extractColumnHeaders(rows) {
  for (var i = rows.length - 1; i >= 0; i--) {
    var row = rows[i];
    var cells = resolveCellPositions(row.cells);
    var labels = cells.filter(function(c) { return c.cell.value && c.cell.mergeAcross === 0; });
    if (labels.length >= 3) {
      var headers = [];
      for (var j = 0; j < cells.length; j++) {
        headers[cells[j].col] = cells[j].cell.value;
      }
      return headers;
    }
  }
  return [];
}

function writeRow(ws, merges, outRow, row, styles) {
  var cells = resolveCellPositions(row.cells);
  for (var i = 0; i < cells.length; i++) {
    var cell = cells[i].cell;
    var col = cells[i].col;
    var ref = XLSX.utils.encode_cell({ r: outRow, c: col });
    var style = toXlsxStyle(styles.get(cell.styleId));
    var cellType = "s";
    var cellVal = cell.value;
    if (cell.type === "Number" && cell.value !== "") {
      cellType = "n";
      cellVal = Number(cell.value);
    } else if (cell.type === "DateTime" && cell.value) {
      cellType = "s";
      cellVal = cell.value.split("T")[0];
    }
    ws[ref] = { t: cellType, v: cellVal, s: style };
    if (cell.mergeAcross > 0 || cell.mergeDown > 0) {
      merges.push({ s: { r: outRow, c: col }, e: { r: outRow + cell.mergeDown, c: col + cell.mergeAcross } });
    }
  }
}

function replaceTemplateVars(xml, vars) {
  var result = xml;
  for (var key in vars) {
    if (vars.hasOwnProperty(key)) {
      result = result.split("{{" + key + "}}").join(vars[key]);
    }
  }
  return result;
}

function flattenJsonData(data) {
  var flat = [];
  for (var i = 0; i < data.length; i++) {
    var item = data[i];
    if (Array.isArray(item)) {
      var rows = item.filter(function(e) { return e.type === "row" || !e.type; });
      var others = item.filter(function(e) { return e.type && e.type !== "row"; });
      rows.sort(function(a, b) { return (parseInt(a.No || "0", 10)) - (parseInt(b.No || "0", 10)); });
      flat = flat.concat(rows, others);
    } else {
      flat.push(item);
    }
  }
  return flat;
}

function buildXlsxFromSections(params) {
  var XLSX = window.XLSX;
  if (!XLSX) throw new Error("xlsx.bundle.js 로드 실패");

  var stylesXml = params.stylesXml;
  var headerXml = params.headerXml;
  var rowXml = params.rowXml;
  var summaryXml = params.summaryXml;
  var footerXml = params.footerXml;
  var jsonData = params.jsonData;
  var templateVars = params.templateVars || {};

  if (Object.keys(templateVars).length > 0) {
    headerXml = replaceTemplateVars(headerXml, templateVars);
  }

  var headerSection = parseSectionXml(headerXml, stylesXml);
  var rowSection = parseSectionXml(rowXml, stylesXml);
  var summarySection = parseSectionXml(summaryXml, stylesXml);
  var footerSection = parseSectionXml(footerXml, stylesXml);

  var allStyles = new Map([
    ...headerSection.styles, ...rowSection.styles, ...summarySection.styles, ...footerSection.styles
  ]);

  var columnHeaders = extractColumnHeaders(headerSection.rows);
  var rowTemplate = rowSection.rows[0];
  var summaryTemplate = summarySection.rows[0];
  if (!rowTemplate) throw new Error("Row 서식에 <Row> 요소가 없습니다.");

  var flatData = flattenJsonData(jsonData);
  var wb = XLSX.utils.book_new();
  var ws = {};
  var merges = [];
  var rowHeights = [];

  var colWidthMap = new Map();
  var colPos = 0;
  for (var ci = 0; ci < headerSection.columns.length; ci++) {
    var col = headerSection.columns[ci];
    if (col.index !== undefined) colPos = col.index - 1;
    colWidthMap.set(colPos, col.width);
    colPos++;
  }

  var outRow = 0;
  var currentRow = 0;
  for (var hi = 0; hi < headerSection.rows.length; hi++) {
    var row = headerSection.rows[hi];
    if (row.index !== undefined) currentRow = row.index - 1;
    outRow = currentRow;
    writeRow(ws, merges, outRow, row, allStyles);
    if (row.height) rowHeights.push({ r: outRow, hpt: row.height });
    currentRow++;
  }
  outRow = currentRow;

  for (var di = 0; di < flatData.length; di++) {
    var entry = flatData[di];
    var type = entry.type || "row";

    if (type === "row") {
      var cells = resolveCellPositions(rowTemplate.cells);
      for (var ci2 = 0; ci2 < cells.length; ci2++) {
        var cell = cells[ci2].cell;
        var c = cells[ci2].col;
        var ref = XLSX.utils.encode_cell({ r: outRow, c: c });
        var style = toXlsxStyle(allStyles.get(cell.styleId));
        var val = "";
        var colHeader = columnHeaders[c];
        var quantityAlias = colHeader === "수량" ? "사용량" : (colHeader === "사용량" ? "수량" : undefined);
        if (colHeader && colHeader in entry) val = String(entry[colHeader] != null ? entry[colHeader] : "");
        else if (quantityAlias && quantityAlias in entry) val = String(entry[quantityAlias] != null ? entry[quantityAlias] : "");
        var cellType = "s";
        var cellVal = val;
        if (val !== "" && !isNaN(Number(val))) { cellType = "n"; cellVal = Number(val); }
        ws[ref] = { t: cellType, v: cellVal, s: style };
        if (cell.mergeAcross > 0 || cell.mergeDown > 0) {
          merges.push({ s: { r: outRow, c: c }, e: { r: outRow + cell.mergeDown, c: c + cell.mergeAcross } });
        }
      }
      if (rowTemplate.height) rowHeights.push({ r: outRow, hpt: rowTemplate.height });
    } else if (type === "summary" && summaryTemplate) {
      var cells2 = resolveCellPositions(summaryTemplate.cells);
      for (var si = 0; si < cells2.length; si++) {
        var cell2 = cells2[si].cell;
        var c2 = cells2[si].col;
        var ref2 = XLSX.utils.encode_cell({ r: outRow, c: c2 });
        var style2 = toXlsxStyle(allStyles.get(cell2.styleId));
        var val2 = cell2.value;
        if (cell2.mergeAcross > 0) val2 = entry.label || entry.text || cell2.value;
        ws[ref2] = { t: "s", v: val2, s: style2 };
        if (cell2.mergeAcross > 0 || cell2.mergeDown > 0) {
          merges.push({ s: { r: outRow, c: c2 }, e: { r: outRow + cell2.mergeDown, c: c2 + cell2.mergeAcross } });
        }
      }
      if (summaryTemplate.height) rowHeights.push({ r: outRow, hpt: summaryTemplate.height });
    }
    outRow++;
  }

  for (var fi = 0; fi < footerSection.rows.length; fi++) {
    var frow = footerSection.rows[fi];
    writeRow(ws, merges, outRow, frow, allStyles);
    if (frow.height) rowHeights.push({ r: outRow, hpt: frow.height });
    outRow++;
  }

  var maxCol = 9;
  ws["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: Math.max(outRow - 1, 0), c: maxCol } });
  ws["!merges"] = merges;
  ws["!cols"] = [];
  for (var cc = 0; cc <= maxCol; cc++) {
    ws["!cols"].push({ wch: Math.round((colWidthMap.get(cc) || 75) / 7) });
  }
  ws["!rows"] = [];
  for (var ri = 0; ri < rowHeights.length; ri++) {
    var rh = rowHeights[ri];
    if (!ws["!rows"][rh.r]) ws["!rows"][rh.r] = {};
    ws["!rows"][rh.r].hpt = rh.hpt;
  }

  XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
  return wb;
}

function downloadWorkbook(wb, fileName) {
  var XLSX = window.XLSX;
  if (!XLSX) throw new Error("xlsx.bundle.js 로드 실패");
  XLSX.writeFile(wb, fileName + ".xlsx");
}

// ─── Main Logic ─────────────────────────────────────────────

function generateFromJson(jsonStr, fileName, opts) {
  opts = opts || {};
  var stylesXml = opts.stylesXml || DEFAULT_STYLES_XML;
  var headerXml = opts.headerXml || DEFAULT_HEADER_XML;
  var rowXml = opts.rowXml || DEFAULT_ROW_XML;
  var summaryXml = opts.summaryXml || DEFAULT_SUMMARY_XML;
  var footerXml = opts.footerXml || DEFAULT_FOOTER_XML;

  var parsed = JSON.parse(jsonStr);
  var jsonData, templateVars = {};
  if (parsed && !Array.isArray(parsed) && parsed.data) {
    templateVars = parsed.vars || {};
    jsonData = Array.isArray(parsed.data) ? parsed.data : [parsed.data];
  } else {
    jsonData = Array.isArray(parsed) ? parsed : [parsed];
  }
  var wb = buildXlsxFromSections({
    stylesXml: stylesXml,
    headerXml: headerXml,
    rowXml: rowXml,
    summaryXml: summaryXml,
    footerXml: footerXml,
    jsonData: jsonData,
    templateVars: templateVars
  });
  downloadWorkbook(wb, fileName || "output");
}

// ─── postMessage listener ───
window.addEventListener('message', function(event) {
  try {
    var msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    if (msg && msg.action === 'generate') {
      showOverlay('⏳', '엑셀 파일을 생성 중입니다...', '#333');
      setTimeout(function() {
        try {
          var jsonStr = typeof msg.json === 'string' ? msg.json : JSON.stringify(msg.json);
          var fileName = msg.filename || 'output';
          var opts = {};
          if (msg.template) {
            if (msg.template.styles) opts.stylesXml = msg.template.styles;
            if (msg.template.header) opts.headerXml = msg.template.header;
            if (msg.template.row) opts.rowXml = msg.template.row;
            if (msg.template.summary) opts.summaryXml = msg.template.summary;
            if (msg.template.footer) opts.footerXml = msg.template.footer;
          }
          generateFromJson(jsonStr, fileName, opts);
          showOverlay('✅', '다운로드 완료! (' + fileName + '.xlsx)', '#2e7d32', true);
        } catch (err) {
          showOverlay('❌', '오류: ' + (err.message || err), '#c62828');
        }
      }, 300);
    }
  } catch (e) {}
});

function showOverlay(icon, text, color, autoClose) {
  document.getElementById('app').innerHTML =
    '<div style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f8f9fa">' +
    '<div style="text-align:center"><div style="font-size:2rem;margin-bottom:12px">' + icon + '</div>' +
    '<div style="font-size:1.1rem;color:' + color + '">' + text + '</div>' +
    (autoClose ? '<div style="font-size:.85rem;color:#888;margin-top:8px">2초 후 창이 닫힙니다...</div>' : '') +
    '</div></div>';
  if (autoClose) setTimeout(function() { window.close(); }, 2000);
}

// ─── URL Auto Download ──────────────────────────────────────
(function() {
  var params = new URLSearchParams(window.location.search);
  var jsonParam = params.get("json");

  if (jsonParam) {
    showOverlay('⏳', '엑셀 파일을 생성 중입니다...', '#333');
    loadTemplate(templateUrl).catch(function() {}).then(function() {
      setTimeout(function() {
        try {
          var decoded = decodeURIComponent(jsonParam);
          var fileName = params.get("filename") || "output";
          generateFromJson(decoded, fileName);
          showOverlay('✅', '다운로드 완료! (' + fileName + '.xlsx)', '#2e7d32', true);
        } catch (err) {
          showOverlay('❌', '오류: ' + (err.message || err), '#c62828');
        }
      }, 300);
    });
    return;
  }

  // ─── Manual UI (no params) ─────────────────────────────────
  loadTemplate(templateUrl).catch(function() {}).then(function() {
    renderUI();
  });
})();

// ─── Vars 키-값 UI 관리 ─────────────────────────────────────

var varsData = []; // [{key:'', value:''}]

function parseVarsFromTemplate() {
  // Header XML에서 {{키}} 패턴 추출
  varsData = [];
  var matches = DEFAULT_HEADER_XML.match(/\{\{([^}]+)\}\}/g);
  if (matches) {
    var seen = {};
    for (var i = 0; i < matches.length; i++) {
      var key = matches[i].replace(/\{\{|\}\}/g, '');
      if (!seen[key]) {
        seen[key] = true;
        varsData.push({ key: key, value: '' });
      }
    }
  }
  if (varsData.length === 0) {
    varsData.push({ key: '', value: '' });
  }
}

function renderVarsUI() {
  var html = '';
  for (var i = 0; i < varsData.length; i++) {
    html += '<div class="kv-row">' +
      '<input class="kv-key" placeholder="키 (예: 경찰서)" value="' + escAttr(varsData[i].key) + '" onchange="varsData[' + i + '].key=this.value"/>' +
      '<input class="kv-val" placeholder="값" value="' + escAttr(varsData[i].value) + '" onchange="varsData[' + i + '].value=this.value"/>' +
      '<button class="kv-del" onclick="removeVar(' + i + ')">✕</button>' +
      '</div>';
  }
  html += '<button class="add-btn" onclick="addVar()">+ 변수 추가</button>';
  return html;
}

function addVar() {
  varsData.push({ key: '', value: '' });
  document.getElementById('vars-container').innerHTML = renderVarsUI();
}

function removeVar(idx) {
  varsData.splice(idx, 1);
  if (varsData.length === 0) varsData.push({ key: '', value: '' });
  document.getElementById('vars-container').innerHTML = renderVarsUI();
}

function getVarsObject() {
  var obj = {};
  for (var i = 0; i < varsData.length; i++) {
    if (varsData[i].key.trim()) {
      obj[varsData[i].key.trim()] = varsData[i].value;
    }
  }
  return obj;
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── UI Render ──────────────────────────────────────────────

function renderUI() {
  var esc = function(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  parseVarsFromTemplate();

  document.getElementById("app").innerHTML =
    '<h1>서식 보존 엑셀 생성</h1>' +
    '<p class="subtitle">XML 서식 + JSON → Excel (.xlsx)</p>' +
    '<p class="subtitle" style="color:#2563eb;font-size:.75rem">서식 파일: <code>' + esc(templateFileName) + '</code> ' +
    (templateLoaded ? '✅ 로드 완료' : '⚠️ 파일 없음 (수동 입력)') + '</p>' +

    // Template sections card
    '<div class="card">' +
    '<h2>서식 설정 (SpreadsheetML XML)</h2>' +

    // Styles (collapsible)
    '<div class="section-group">' +
    '<button class="collapsible-btn" onclick="toggleSection(\'styles\')">▶ 스타일 정의 (고급)</button>' +
    '<div id="styles-section" class="collapsible-content">' +
    '<textarea id="stylesInput" rows="10">' + esc(DEFAULT_STYLES_XML) + '</textarea>' +
    '</div></div>' +

    '<label>Header</label>' +
    '<textarea id="headerInput" rows="8" oninput="onHeaderChange()">' + esc(DEFAULT_HEADER_XML) + '</textarea>' +

    '<label>Row (데이터 행 템플릿)</label>' +
    '<textarea id="rowInput" rows="5">' + esc(DEFAULT_ROW_XML) + '</textarea>' +

    '<label>Summary (소계 행 템플릿)</label>' +
    '<textarea id="summaryInput" rows="4">' + esc(DEFAULT_SUMMARY_XML) + '</textarea>' +

    '<label>Footer</label>' +
    '<textarea id="footerInput" rows="5">' + esc(DEFAULT_FOOTER_XML) + '</textarea>' +

    '<div style="margin-top:.8rem" class="actions">' +
    '<button class="success" onclick="saveTemplate()">💾 서식 저장 (' + esc(templateFileName) + ')</button>' +
    '</div>' +
    '</div>' +

    // Template file management
    '<div class="card">' +
    '<h2>서식 파일 관리</h2>' +
    '<div class="actions" style="margin-bottom:.5rem">' +
    '<button class="outline" style="flex:1" onclick="document.getElementById(\'tplFileInput\').click()">📥 서식 JSON 불러오기</button>' +
    '<input type="file" id="tplFileInput" accept=".json" style="display:none" onchange="importTemplate(this)">' +
    '</div>' +
    '</div>' +

    // JSON data card - split into vars + data
    '<div class="card">' +
    '<h2>데이터 입력</h2>' +

    '<label>헤더 변수 (vars)</label>' +
    '<p style="font-size:.7rem;color:#888;margin-bottom:.4rem">Header XML의 <code>{{키}}</code>에 대응하는 값을 입력합니다.</p>' +
    '<div id="vars-container">' + renderVarsUI() + '</div>' +

    '<label>데이터 (data)</label>' +
    '<p style="font-size:.7rem;color:#888;margin-bottom:.4rem">행/요약 데이터 배열. <code>type: "row"</code> 또는 <code>type: "summary"</code></p>' +
    '<textarea id="dataInput" rows="10">[]</textarea>' +
    '</div>' +

    // postMessage usage guide
    '<div class="card">' +
    '<h2>외부 호출 방법 (postMessage)</h2>' +
    '<p style="font-size:.75rem;color:#888;margin-bottom:.5rem">URL 길이 제한 없이 데이터를 전달할 수 있습니다.</p>' +
    '<pre style="background:#f1f3f5;padding:.5rem;border-radius:6px;font-size:.65rem;overflow-x:auto;white-space:pre-wrap">' +
    '// 다른 웹페이지에서\n' +
    'var w = window.open("excelDownloadTest.html");\n' +
    'w.onload = function() {\n' +
    '  w.postMessage({\n' +
    '    action: "generate",\n' +
    '    json: { vars: {...}, data: [[...]] },\n' +
    '    filename: "output"\n' +
    '  }, "*");\n' +
    '};\n\n' +
    '// FileMaker WebViewer에서\n' +
    'FileMaker.PerformScript("ExcelDownload", JSON.stringify({\n' +
    '  action: "generate",\n' +
    '  json: { vars: {...}, data: [[...]] },\n' +
    '  filename: "output"\n' +
    '}));</pre>' +
    '</div>' +

    // Actions
    '<div class="actions">' +
    '<button class="primary" onclick="handleGenerate()">⬇ 엑셀 다운로드 (.xlsx)</button>' +
    '<button class="outline" onclick="handleReset()">초기화</button>' +
    '</div>';
}

function onHeaderChange() {
  // Header 변경 시 vars 키 자동 감지 업데이트
  var headerXml = document.getElementById('headerInput').value;
  var matches = headerXml.match(/\{\{([^}]+)\}\}/g);
  var newKeys = [];
  if (matches) {
    var seen = {};
    for (var i = 0; i < matches.length; i++) {
      var key = matches[i].replace(/\{\{|\}\}/g, '');
      if (!seen[key]) { seen[key] = true; newKeys.push(key); }
    }
  }
  // 기존 값 보존하면서 키 목록 업데이트
  var oldMap = {};
  for (var j = 0; j < varsData.length; j++) {
    if (varsData[j].key) oldMap[varsData[j].key] = varsData[j].value;
  }
  varsData = [];
  for (var k = 0; k < newKeys.length; k++) {
    varsData.push({ key: newKeys[k], value: oldMap[newKeys[k]] || '' });
  }
  if (varsData.length === 0) varsData.push({ key: '', value: '' });
  document.getElementById('vars-container').innerHTML = renderVarsUI();
}

function toggleSection(id) {
  var el = document.getElementById(id + '-section');
  var btn = el.previousElementSibling || el.parentElement.querySelector('.collapsible-btn');
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    if (btn) btn.textContent = '▶ 스타일 정의 (고급)';
  } else {
    el.classList.add('open');
    if (btn) btn.textContent = '▼ 스타일 정의 (고급)';
  }
}

function handleGenerate() {
  try {
    var vars = getVarsObject();
    var dataStr = document.getElementById("dataInput").value.trim();
    var data = dataStr ? JSON.parse(dataStr) : [];
    var fullJson = JSON.stringify({ vars: vars, data: data });
    var opts = {
      stylesXml: document.getElementById("stylesInput").value,
      headerXml: document.getElementById("headerInput").value,
      rowXml: document.getElementById("rowInput").value,
      summaryXml: document.getElementById("summaryInput").value,
      footerXml: document.getElementById("footerInput").value
    };
    generateFromJson(fullJson, "output", opts);
  } catch (err) {
    alert("오류: " + (err.message || err));
  }
}

function handleReset() {
  loadTemplate(templateUrl).catch(function() {}).then(function() {
    renderUI();
  });
}

function saveTemplate() {
  var tpl = {
    styles: document.getElementById("stylesInput").value,
    header: document.getElementById("headerInput").value,
    row: document.getElementById("rowInput").value,
    summary: document.getElementById("summaryInput").value,
    footer: document.getElementById("footerInput").value
  };
  var blob = new Blob([JSON.stringify(tpl, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = templateFileName;
  a.click();
  URL.revokeObjectURL(a.href);
  alert('서식 파일 "' + templateFileName + '" 다운로드 완료!\n서버에 업로드하면 적용됩니다.');
}

function importTemplate(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var tpl = JSON.parse(e.target.result);
      if (tpl.styles) document.getElementById("stylesInput").value = tpl.styles;
      if (tpl.header) document.getElementById("headerInput").value = tpl.header;
      if (tpl.row) document.getElementById("rowInput").value = tpl.row;
      if (tpl.summary) document.getElementById("summaryInput").value = tpl.summary;
      if (tpl.footer) document.getElementById("footerInput").value = tpl.footer;
      onHeaderChange();
      alert('서식 불러오기 완료!');
    } catch (err) {
      alert('JSON 파일 파싱 오류: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}
</script>
</body>
</html>
